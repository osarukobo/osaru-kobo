name: Weekly Security Trends Update

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-advocate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Update advocate.md via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import anthropic, datetime, os
          try:
              with open("advocate.md", "r", encoding="utf-8") as f:
                  current = f.read()
          except FileNotFoundError:
              current = ""
          today = datetime.date.today().strftime("%Y年%m月%d日")
          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          msg = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=2048,
              messages=[{"role":"user","content":f"サイバーセキュリティ専門家として今日{today}の最新トレンドでadvocate.mdを更新。現在の内容:\n{current}\nMarkdown形式のみ出力。"}]
          )
          with open("advocate.md", "w", encoding="utf-8") as f:
              f.write(msg.content[0].text)
          print("完了")
          PYEOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local
